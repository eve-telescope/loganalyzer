; PHP settings for the FrankenPHP static binary (Octane).
; Loaded automatically from the working directory the server starts in.

; Combat logs are multi-megabyte text uploads; the PHP defaults (2M/8M)
; would reject them long before the application's own upload limit
; (LOGANALYZER_UPLOAD_MAX_SIZE_MB) is checked.
upload_max_filesize = 64M
post_max_size = 68M

; Parsing a large log materialises tens of thousands of event objects
; before they are chunk-inserted.
memory_limit = 512M
max_execution_time = 120
