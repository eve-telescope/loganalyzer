version: 2

updates:
  - package-ecosystem: composer
    directory: '/'
    schedule:
      interval: weekly
      day: monday
    groups:
      composer-dependencies:
        patterns: ['*']
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
      day: monday
    groups:
      npm-dependencies:
        patterns: ['*']
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
      day: monday
