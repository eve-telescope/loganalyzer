name: Code Quality

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: code-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pint:
    name: Pint (PHP Code Style)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: none

      - name: Install Composer Dependencies
        run: composer install --no-interaction --no-scripts --prefer-dist

      - name: Run Pint
        run: vendor/bin/pint --parallel --test

  static-analysis:
    name: Larastan & Rector
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: none

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run Larastan
        run: vendor/bin/phpstan analyse --no-progress

      - name: Run Rector (dry run)
        run: vendor/bin/rector --dry-run --no-progress-bar

  frontend:
    name: ESLint, Prettier & TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Install Node Dependencies
        run: npm ci

      - name: Prepare Environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Generate Wayfinder Types
        run: php artisan wayfinder:generate

      - name: Run ESLint
        run: npm run lint:check

      - name: Run Prettier
        run: npm run format:check

      - name: Run TypeScript Check
        run: npm run types:check
